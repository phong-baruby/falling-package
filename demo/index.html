<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Animation Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 10;
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .header p {
      color: #a0a0a0;
      font-size: 1.1rem;
    }

    .controls {
      max-width: 800px;
      margin: 0 auto 30px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 10;
    }

    .controls h2 {
      margin-bottom: 20px;
      font-size: 1.2rem;
      color: #48dbfb;
    }

    .control-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .control-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-item label {
      font-size: 0.9rem;
      color: #ccc;
    }

    .control-item select,
    .control-item input[type="range"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 0.95rem;
    }

    .control-item select:focus,
    .control-item input[type="range"]:focus {
      outline: none;
      border-color: #48dbfb;
    }

    .control-item input[type="range"] {
      -webkit-appearance: none;
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .control-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #48dbfb;
      border-radius: 50%;
      cursor: pointer;
    }

    .range-value {
      font-size: 0.85rem;
      color: #48dbfb;
      text-align: right;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #48dbfb, #0abde3);
      color: #1a1a2e;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .presets {
      max-width: 800px;
      margin: 0 auto 30px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 10;
    }

    .presets h2 {
      margin-bottom: 15px;
      font-size: 1.2rem;
      color: #feca57;
    }

    .preset-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      font-size: 0.95rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    .stats {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      font-size: 0.9rem;
      z-index: 10000;
    }

    .stats-item {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .stats-value {
      color: #48dbfb;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      padding: 30px;
      color: #666;
      font-size: 0.9rem;
      position: relative;
      z-index: 10;
    }

    .footer a {
      color: #48dbfb;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Demo container for bounded demo */
    .demo-container {
      max-width: 800px;
      margin: 0 auto 30px;
      height: 300px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .demo-container-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 1.2rem;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>🎉 Falling Animation</h1>
    <p>A lightweight, customizable falling objects animation library</p>
  </div>

  <div class="controls">
    <h2>⚙️ Controls</h2>
    <div class="control-group">
      <div class="control-item">
        <label>Animation Type</label>
        <select id="animationType">
          <option value="fall">Fall (Simple)</option>
          <option value="swing" selected>Swing (Pendulum)</option>
          <option value="rotate">Rotate (Spin)</option>
          <option value="flutter">Flutter (Butterfly)</option>
          <option value="spiral">Spiral</option>
          <option value="tumble">Tumble (Chaotic)</option>
          <option value="zigzag">Zigzag</option>
          <option value="float">Float (Gentle)</option>
          <option value="random">Random Mix</option>
        </select>
      </div>

      <div class="control-item">
        <label>Speed: <span id="speedValue" class="range-value">3</span></label>
        <input type="range" id="speed" min="0" max="10" value="3" step="0.5">
      </div>

      <div class="control-item">
        <label>Spawn Rate: <span id="rateValue" class="range-value">3/s</span></label>
        <input type="range" id="spawnRate" min="1" max="20" value="3">
      </div>

      <div class="control-item">
        <label>Max Particles: <span id="maxValue" class="range-value">50</span></label>
        <input type="range" id="maxParticles" min="10" max="200" value="50">
      </div>

      <div class="control-item">
        <label>Size: <span id="sizeValue" class="range-value">30px</span></label>
        <input type="range" id="size" min="10" max="80" value="30">
      </div>

      <div class="control-item">
        <label>Wind: <span id="windValue" class="range-value">0</span></label>
        <input type="range" id="wind" min="-10" max="10" value="0">
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-primary" id="btnStart">▶️ Start</button>
      <button class="btn btn-secondary" id="btnPause">⏸️ Pause</button>
      <button class="btn btn-danger" id="btnStop">⏹️ Stop</button>
    </div>
  </div>

  <div class="presets">
    <h2>🎨 Presets</h2>
    <div class="preset-buttons">
      <button class="preset-btn" data-preset="snow">❄️ Snow</button>
      <button class="preset-btn" data-preset="leaves">🍁 Autumn Leaves</button>
      <button class="preset-btn" data-preset="sakura">🌸 Sakura</button>
      <button class="preset-btn" data-preset="confetti">🎊 Confetti</button>
      <button class="preset-btn" data-preset="hearts">💕 Hearts</button>
      <button class="preset-btn" data-preset="money">💵 Money Rain</button>
      <button class="preset-btn" data-preset="stars">⭐ Stars</button>
      <button class="preset-btn" data-preset="newyear">🎆 New Year</button>
    </div>
  </div>

  <div class="presets" style="border-color: #ff6b6b;">
    <h2 style="color: #ff6b6b;">🎆 Fireworks</h2>
    <p style="color: #888; margin-bottom: 15px;">Real firework effects with rockets and explosions!</p>
    <div class="control-group">
      <div class="control-item">
        <label>Explosion Pattern</label>
        <select id="fwPattern">
          <option value="random" selected>🎲 Random Mix</option>
          <option value="circular">⭕ Circular</option>
          <option value="ring">💍 Ring</option>
          <option value="heart">❤️ Heart</option>
          <option value="star">⭐ Star</option>
          <option value="willow">🌳 Willow</option>
          <option value="palm">🌴 Palm</option>
          <option value="chrysanthemum">🌼 Chrysanthemum</option>
          <option value="embers">✨ Embers (Tàn Lửa)</option>
          <option value="double">🎇 Double (Nổ 2 Lần)</option>
          <option value="waterfall">🌊 Waterfall (Thác Nước)</option>
        </select>
      </div>
      <div class="control-item">
        <label>Launch Rate: <span id="fwRateValue" class="range-value">1/s</span></label>
        <input type="range" id="fwRate" min="0.5" max="3" value="1" step="0.5">
      </div>
      <div class="control-item">
        <label>Particles/Explosion: <span id="fwParticlesValue" class="range-value">40</span></label>
        <input type="range" id="fwParticles" min="20" max="80" value="40">
      </div>
    </div>
    <div class="buttons">
      <button class="btn btn-primary" id="btnFwStart" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);">🎆
        Start Fireworks</button>
      <button class="btn btn-secondary" id="btnFwBurst">💥 Burst (5x)</button>
      <button class="btn btn-danger" id="btnFwStop">⏹️ Stop</button>
    </div>
  </div>

  <div class="stats">
    <div class="stats-item">
      <span>Particles:</span>
      <span class="stats-value" id="particleCount">0</span>
    </div>
    <div class="stats-item">
      <span>Status:</span>
      <span class="stats-value" id="status">Stopped</span>
    </div>
  </div>

  <div class="footer">
    <p>Made with ❤️ | <a href="https://github.com/phongdh/falling-animation">GitHub</a> | v0.1.0</p>
  </div>

  <script type="module">
    import { FallingAnimation, Fireworks } from '../dist/falling-animation.esm.js';

    // Fireworks instance
    let fireworks = null;

    // Fireworks controls
    const fwRateSlider = document.getElementById('fwRate');
    const fwParticlesSlider = document.getElementById('fwParticles');
    const fwPatternSelect = document.getElementById('fwPattern');
    const fwRateValue = document.getElementById('fwRateValue');
    const fwParticlesValue = document.getElementById('fwParticlesValue');
    const btnFwStart = document.getElementById('btnFwStart');
    const btnFwBurst = document.getElementById('btnFwBurst');
    const btnFwStop = document.getElementById('btnFwStop');

    // Fireworks handlers
    fwRateSlider.addEventListener('input', () => {
      fwRateValue.textContent = fwRateSlider.value + '/s';
      if (fireworks) {
        fireworks.setOptions({ launchRate: parseFloat(fwRateSlider.value) });
      }
    });

    fwParticlesSlider.addEventListener('input', () => {
      fwParticlesValue.textContent = fwParticlesSlider.value;
      if (fireworks) {
        fireworks.setOptions({ particlesPerExplosion: parseInt(fwParticlesSlider.value) });
      }
    });

    fwPatternSelect.addEventListener('change', () => {
      if (fireworks) {
        fireworks.setOptions({ explosionPattern: fwPatternSelect.value });
      }
    });

    btnFwStart.addEventListener('click', () => {
      if (!fireworks) {
        fireworks = new Fireworks({
          launchRate: parseFloat(fwRateSlider.value),
          particlesPerExplosion: parseInt(fwParticlesSlider.value),
          explosionPattern: fwPatternSelect.value
        });
      } else if (!fireworks.getIsRunning()) {
        fireworks.start();
      }
      btnFwStart.textContent = '🎆 Running...';
    });

    btnFwBurst.addEventListener('click', () => {
      if (!fireworks) {
        fireworks = new Fireworks({
          launchRate: 0,
          particlesPerExplosion: parseInt(fwParticlesSlider.value),
          autoStart: false
        });
        fireworks.start();
      }
      fireworks.burst(5);
    });

    btnFwStop.addEventListener('click', () => {
      if (fireworks) {
        fireworks.stop();
        fireworks.clear();
        btnFwStart.textContent = '🎆 Start Fireworks';
      }
    });

    // Presets configuration
    const presets = {
      snow: {
        objects: [
          { type: 'emoji', content: '❄️' },
          { type: 'emoji', content: '❅' },
          { type: 'emoji', content: '❆' }
        ],
        animation: 'float',
        speed: { min: 1, max: 3 },
        size: { min: 15, max: 35 }
      },
      leaves: {
        objects: [
          { type: 'emoji', content: '🍁', weight: 3 },
          { type: 'emoji', content: '🍂', weight: 2 },
          { type: 'emoji', content: '🍃', weight: 1 }
        ],
        animation: 'swing',
        speed: { min: 2, max: 4 },
        size: { min: 25, max: 45 }
      },
      sakura: {
        objects: [
          { type: 'emoji', content: '🌸' },
          { type: 'emoji', content: '💮' }
        ],
        animation: 'flutter',
        speed: { min: 1, max: 3 },
        size: { min: 20, max: 40 }
      },
      confetti: {
        objects: [
          { type: 'emoji', content: '🎊' },
          { type: 'emoji', content: '🎉' },
          { type: 'emoji', content: '✨' },
          { type: 'emoji', content: '🎈' }
        ],
        animation: ['tumble', 'rotate', 'zigzag'],
        speed: { min: 3, max: 6 },
        size: { min: 20, max: 35 },
        spawnRate: 8
      },
      hearts: {
        objects: [
          { type: 'emoji', content: '❤️' },
          { type: 'emoji', content: '💕' },
          { type: 'emoji', content: '💖' },
          { type: 'emoji', content: '💗' }
        ],
        animation: 'float',
        speed: { min: 1, max: 2 },
        size: { min: 20, max: 40 }
      },
      money: {
        objects: [
          { type: 'emoji', content: '💵' },
          { type: 'emoji', content: '💰' },
          { type: 'emoji', content: '💸' }
        ],
        animation: 'swing',
        speed: { min: 3, max: 5 },
        size: { min: 30, max: 50 }
      },
      stars: {
        objects: [
          { type: 'emoji', content: '⭐' },
          { type: 'emoji', content: '🌟' },
          { type: 'emoji', content: '✨' }
        ],
        animation: 'spiral',
        speed: { min: 2, max: 4 },
        size: { min: 15, max: 30 }
      },
      newyear: {
        objects: [
          { type: 'emoji', content: '🎆' },
          { type: 'emoji', content: '🎇' },
          { type: 'emoji', content: '✨' },
          { type: 'emoji', content: '🎊' },
          { type: 'emoji', content: '🥂' }
        ],
        animation: ['tumble', 'rotate', 'spiral'],
        speed: { min: 2, max: 5 },
        size: { min: 25, max: 45 },
        spawnRate: 6
      }
    };

    // Initialize main animation (fullscreen)
    let mainAnimation = null;

    // DOM elements
    const animationType = document.getElementById('animationType');
    const speedSlider = document.getElementById('speed');
    const spawnRateSlider = document.getElementById('spawnRate');
    const maxParticlesSlider = document.getElementById('maxParticles');
    const sizeSlider = document.getElementById('size');
    const windSlider = document.getElementById('wind');

    const speedValue = document.getElementById('speedValue');
    const rateValue = document.getElementById('rateValue');
    const maxValue = document.getElementById('maxValue');
    const sizeValue = document.getElementById('sizeValue');
    const windValue = document.getElementById('windValue');

    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnStop = document.getElementById('btnStop');

    const particleCountEl = document.getElementById('particleCount');
    const statusEl = document.getElementById('status');

    // Get current settings
    function getCurrentSettings() {
      const speed = parseFloat(speedSlider.value);
      const size = parseInt(sizeSlider.value);
      let animation = animationType.value;

      if (animation === 'random') {
        animation = ['fall', 'swing', 'rotate', 'flutter', 'spiral', 'tumble', 'zigzag', 'float'];
      }

      return {
        objects: [
          { type: 'emoji', content: '🍁' },
          { type: 'emoji', content: '🌸' },
          { type: 'emoji', content: '❄️' }
        ],
        animation,
        speed: speed === 0 ? { min: 0, max: 0 } : { min: Math.max(0.5, speed - 1), max: speed + 2 },
        spawnRate: parseInt(spawnRateSlider.value),
        maxParticles: parseInt(maxParticlesSlider.value),
        size: { min: size - 10, max: size + 10 },
        wind: parseInt(windSlider.value) / 10,
        autoStart: false
      };
    }

    // Create animation
    function createAnimation() {
      if (mainAnimation) {
        mainAnimation.destroy();
      }
      mainAnimation = new FallingAnimation(getCurrentSettings());
    }

    // Update stats
    function updateStats() {
      if (mainAnimation) {
        particleCountEl.textContent = mainAnimation.getParticleCount();

        if (mainAnimation.getIsRunning()) {
          statusEl.textContent = 'Running';
          statusEl.style.color = '#48dbfb';
        } else if (mainAnimation.getIsPaused()) {
          statusEl.textContent = 'Paused';
          statusEl.style.color = '#feca57';
        } else {
          statusEl.textContent = 'Stopped';
          statusEl.style.color = '#ff6b6b';
        }
      }
      requestAnimationFrame(updateStats);
    }

    // Initialize
    createAnimation();
    updateStats();

    // Event listeners for sliders
    speedSlider.addEventListener('input', () => {
      const speed = parseFloat(speedSlider.value);
      speedValue.textContent = speed.toFixed(1);
      if (mainAnimation) {
        const speedRange = speed === 0 ? { min: 0, max: 0 } : { min: Math.max(0.5, speed - 1), max: speed + 2 };
        mainAnimation.setOptions({ speed: speedRange });
      }
    });

    spawnRateSlider.addEventListener('input', () => {
      rateValue.textContent = spawnRateSlider.value + '/s';
      if (mainAnimation) {
        mainAnimation.setOptions({ spawnRate: parseInt(spawnRateSlider.value) });
      }
    });

    maxParticlesSlider.addEventListener('input', () => {
      maxValue.textContent = maxParticlesSlider.value;
      if (mainAnimation) {
        mainAnimation.setOptions({ maxParticles: parseInt(maxParticlesSlider.value) });
      }
    });

    sizeSlider.addEventListener('input', () => {
      sizeValue.textContent = sizeSlider.value + 'px';
      if (mainAnimation) {
        const size = parseInt(sizeSlider.value);
        mainAnimation.setOptions({ size: { min: size - 10, max: size + 10 } });
      }
    });

    windSlider.addEventListener('input', () => {
      const wind = parseInt(windSlider.value) / 10;
      windValue.textContent = wind.toFixed(1);
      if (mainAnimation) {
        mainAnimation.setOptions({ wind });
      }
    });

    animationType.addEventListener('change', () => {
      let animation = animationType.value;
      if (animation === 'random') {
        animation = ['fall', 'swing', 'rotate', 'flutter', 'spiral', 'tumble', 'zigzag', 'float'];
      }
      if (mainAnimation) {
        mainAnimation.setOptions({ animation });
      }
    });

    // Control buttons
    btnStart.addEventListener('click', () => {
      if (!mainAnimation || !mainAnimation.getIsRunning()) {
        if (!mainAnimation) {
          createAnimation();
        }
        mainAnimation.start();
      }
    });

    btnPause.addEventListener('click', () => {
      if (mainAnimation) {
        if (mainAnimation.getIsPaused()) {
          mainAnimation.resume();
          btnPause.textContent = '⏸️ Pause';
        } else {
          mainAnimation.pause();
          btnPause.textContent = '▶️ Resume';
        }
      }
    });

    btnStop.addEventListener('click', () => {
      if (mainAnimation) {
        mainAnimation.stop();
        btnPause.textContent = '⏸️ Pause';
      }
    });

    // Preset buttons
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const presetName = btn.dataset.preset;
        const preset = presets[presetName];

        if (preset && mainAnimation) {
          mainAnimation.stop();
          mainAnimation.destroy();

          mainAnimation = new FallingAnimation({
            ...preset,
            autoStart: true,
            maxParticles: parseInt(maxParticlesSlider.value)
          });
        }
      });
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (mainAnimation) mainAnimation.destroy();
      if (fireworks) fireworks.destroy();
    });
  </script>
</body>

</html>
